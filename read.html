<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn With Misham - Quran Study</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Learn With Misham</h1>
        <p>A Project of Jugnu Social Welfare Organization</p>
    </header>

    <div class="controls">

        <label>Select Surah</label>

        <select id="surahSelect">
            <option value="1">Al-Fatihah</option>
            <option value="2">Al-Baqarah</option>
            <option value="3">Ali-Imran</option>
        </select>

        <button onclick="loadSurah()">
            Load Surah
        </button>

    </div>
        <section class="profile">

    <h2>Student Profile</h2>

    <input
        id="studentName"
        placeholder="Student Name">

    <input
        id="teacherName"
        placeholder="Teacher Name">

    <button
        onclick="saveProfile()">
        Save Profile
    </button>

</section>

<section class="dashboard">

    <h2>Progress Dashboard</h2>

    <div class="progress-bar">

        <div
            id="progressFill"
            class="progress-fill">
        </div>

    </div>

    <p id="progressText">
        0% Complete
    </p>

    <p>
        Revision Queue:
        <span id="revisionCount">
            0
        </span>
    </p>

    <h3>Today's Revision</h3>

    <ul id="revisionList">
    </ul>

</section>
    <div id="quranContainer"></div>

<script src="js/storage.js"></script>
<script src="js/profile.js"></script>
<script src="js/progress.js"></script>
<script src="js/surahNames.js"></script>
<script src="js/cloud.js"></script>
<script src="js/app.js"></script>

</body>
</html>
